                    Explora nuestros productos y encuentra lo que estás buscando. Cada artículo ha sido elegido pensando en calidad, estilo y comodidad para ofrecerte la mejor experiencia.

    <div class="lightbox" id="lightbox">
        <span class="close-btn" id="closeLightbox">X</span>

        <img id="lightboxImage">
        <button onclick="window.open('https://wa.me/51974192779?text=Hola%20quiero%20comprar')">COMPRAR</button>
    </div>
    <script src="../aseets/js/menu_3_contacto.js"></script>
    <script src="https://kit.fontawesome.com/81581fb069.js" crossorigin="anonymous">
    </script>
    <script>
        // Obtener el nombre del archivo actual (más limpio que href completo)
        const currentPage = window.location.pathname.split("/").pop();

        // Seleccionar todos los enlaces del menú
        const menuLinks = document.querySelectorAll('.menu a');

        menuLinks.forEach(link => {
            const linkPage = link.getAttribute('href');

            if (linkPage === currentPage) {
                link.classList.add('activo');
            }
        });
    </script>


</body>
